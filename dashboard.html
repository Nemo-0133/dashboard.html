<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Black Box 高維度觀測站</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: monospace; margin: 0; padding: 5px; height: 100vh; overflow: hidden; }
        .grid { display: grid; grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 60vh 35vh; gap: 5px; height: 98%; }
        .box { border: 1px solid #333; background: #000; padding: 5px; overflow: hidden; display: flex; flex-direction: column; }
        .title { border-bottom: 1px solid #333; font-weight: bold; margin-bottom: 5px; color: #aaa; font-size: 12px; }
        .data { font-size: 13px; line-height: 1.4; }
        .log-line { color: #888; border-bottom: 1px dashed #222; }
        .warn { color: #f33; font-weight: bold; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box">
            <div class="title">[SYS.01] 3D 狀態向量密度曲面 (Density Surface)</div>
            <div id="plot3d" style="flex: 1; width: 100%;"></div>
        </div>

        <div class="box" style="grid-column: span 2;">
            <div class="title">[SYS.02] 8維邏輯分支 衰變軌跡</div>
            <canvas id="lineChart" style="width: 100%; height: 100%;"></canvas>
        </div>

        <div class="box">
            <div class="title">[SYS.03] 物理參數係數 (Parameters)</div>
            <div class="data" id="params">WAITING FOR TELEMETRY...</div>
        </div>

        <div class="box">
            <div class="title">[SYS.04] 狀態向量陣列 (State Vector)</div>
            <div class="data" id="matrix" style="color: #0ff; white-space: pre-wrap;"></div>
        </div>

        <div class="box">
            <div class="title">[SYS.05] 觀測日誌 (Logs)</div>
            <div id="logs" class="data" style="overflow-y: auto; display: flex; flex-direction: column-reverse;"></div>
        </div>
    </div>

    <script>
        // 1. 初始化 3D 曲面圖
        const layout3d = { 
            margin: {l: 0, r: 0, b: 0, t: 0}, paper_bgcolor: '#000', plot_bgcolor: '#000',
            scene: {
                xaxis: {gridcolor: '#333', zerolinecolor: '#333', showticklabels: false},
                yaxis: {gridcolor: '#333', zerolinecolor: '#333', showticklabels: false},
                zaxis: {gridcolor: '#333', zerolinecolor: '#333', range: [0, 1]},
                camera: { eye: {x: 1.5, y: 1.5, z: 0.5} }
            }
        };
        Plotly.newPlot('plot3d', [{ z: Array(8).fill(Array(8).fill(0)), type: 'surface', colorscale: 'Viridis', showscale: false }], layout3d);

        // 2. 初始化 8 條波函數折線圖
        const ctx = document.getElementById('lineChart').getContext('2d');
        const colors = ['#f33', '#f93', '#ff3', '#3f3', '#3ff', '#33f', '#93f', '#f3f'];
        const datasets = Array.from({length: 8}, (_, i) => ({
            label: 'Ψ_'+i, data: Array(50).fill(0), borderColor: colors[i], borderWidth: 1, pointRadius: 0
        }));
        const lineChart = new Chart(ctx, {
            type: 'line', data: { labels: Array(50).fill(''), datasets: datasets },
            options: { animation: false, scales: { y: { min: 0, max: 1, grid: {color: '#222'} }, x: { grid: {display: false} } }, plugins: { legend: {display: false} } }
        });

        // 3. 處理 WebSocket 資料流
        const ws = new WebSocket("ws://127.0.0.1:8000/ws/data");
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            
            // 更新 3D 曲面
            Plotly.react('plot3d', [{ z: d.z_surface, type: 'surface', colorscale: 'Viridis', showscale: false }], layout3d);

            // 更新參數區
            document.getElementById('params').innerHTML = 
                `Tick 週期  : ${d.tick}<br>` +
                `觀測商 (γ) : ${d.gamma.toFixed(4)}<br>` +
                `衰變率 (λ) : ${d.lambda.toFixed(4)}<br>` +
                `資訊熵 (S) : ${d.entropy.toFixed(4)}`;

            // 更新矩陣區 (格式化為 8 個數值)
            document.getElementById('matrix').innerText = d.state_vector.map((v, i) => `Ψ_${i}: ${v.toFixed(4)}`).join('\n');

            // 更新日誌
            if (d.log) {
                const logs = document.getElementById('logs');
                const isWarn = d.log.includes("坍縮");
                logs.innerHTML = `<div class="log-line ${isWarn ? 'warn' : ''}">${d.log}</div>` + logs.innerHTML;
                if (logs.children.length > 15) logs.removeChild(logs.lastChild);
            }

            // 更新折線圖
            lineChart.data.labels.push(d.tick);
            lineChart.data.labels.shift();
            d.state_vector.forEach((val, i) => {
                lineChart.data.datasets[i].data.push(val);
                lineChart.data.datasets[i].data.shift();
            });
            lineChart.update();
        };
    </script>
</body>
</html>
