<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Black Box 數值推演觀測站</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #111; color: #ddd; font-family: monospace; margin: 0; padding: 10px; }
        .container { display: grid; grid-template-columns: 70% 30%; gap: 10px; height: 95vh; }
        .box { border: 1px solid #444; background: #000; padding: 10px; overflow-y: auto; }
        .data-text { font-size: 14px; margin-bottom: 5px; color: #0f0; }
        .log-text { font-size: 12px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h3 style="margin-top:0;">[動態折線] 波函數與蓋格曲線推演</h3>
            <canvas id="mainChart" style="width:100%; height:85%;"></canvas>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            
            <div class="box" style="flex: 1;">
                <h4 style="margin-top:0;">[系統參數]</h4>
                <div class="data-text">Tick 週期: <span id="v-tick">0</span></div>
                <div class="data-text">衰變常數 (λ): <span id="v-lam">0.0000</span></div>
                <div class="data-text">綜合商數 (γ): <span id="v-gam">0.0000</span></div>
            </div>

            <div class="box" style="flex: 1.5;">
                <h4 style="margin-top:0;">[狀態向量矩陣]</h4>
                <div id="v-matrix" style="color: #0ff; font-size: 13px; line-height: 1.5;">等待資料...</div>
            </div>

            <div class="box" style="flex: 2;">
                <h4 style="margin-top:0;">[推演日誌]</h4>
                <div id="v-logs" style="display: flex; flex-direction: column-reverse;"></div>
            </div>
        </div>
    </div>

    <script>
        // 初始化圖表
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [
                    { label: 'Ψ_0', data: Array(50).fill(0), borderColor: '#f36', borderWidth: 1, pointRadius: 0 },
                    { label: 'Ψ_1', data: Array(50).fill(0), borderColor: '#3cf', borderWidth: 1, pointRadius: 0 },
                    { label: 'Ψ_2', data: Array(50).fill(0), borderColor: '#cf0', borderWidth: 1, pointRadius: 0 }
                ]
            },
            options: { animation: false, scales: { y: { min: 0, max: 1 } } }
        });

        // 建立連線與資料分配
        const ws = new WebSocket("ws://127.0.0.1:8000/ws/data");
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            
            // 1. 更新計數器
            document.getElementById("v-tick").innerText = data.tick;
            document.getElementById("v-lam").innerText = data.lambda_val.toFixed(4);
            document.getElementById("v-gam").innerText = data.gamma_val.toFixed(4);

            // 2. 更新矩陣
            document.getElementById("v-matrix").innerText = data.raw_matrix.map(v => v.toFixed(4)).join(" | ");

            // 3. 更新日誌 (保留最新 10 筆)
            if (data.log) {
                const logs = document.getElementById("v-logs");
                logs.innerHTML = `<div class="log-text">${data.log}</div>` + logs.innerHTML;
                if (logs.children.length > 10) logs.removeChild(logs.lastChild);
            }

            // 4. 更新曲線圖
            chart.data.labels.push(data.tick);
            chart.data.labels.shift();
            data.waves.forEach((val, i) => {
                chart.data.datasets[i].data.push(val);
                chart.data.datasets[i].data.shift();
            });
            chart.update();
        };
    </script>
</body>
</html>
